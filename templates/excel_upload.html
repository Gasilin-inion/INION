{% extends "base.html" %}

{% block title %}Конвертация файлов Excel в формат ИРБИС-64{% endblock %}

{% block content %}
<h2>Конвертация файлов Excel в формат ИРБИС-64</h2>
<br>
<b>Укажите путь к отредактированным таблицам Excel</b>
<br><br>
<form method="POST" enctype="multipart/form-data">
    <input type="file" name="xlsx_files" multiple required>
    <br><br>
    <button type="submit">Конвертировать</button>
</form>
<p>
    Доступна загрузка нескольких файлов!
</p>
{% endblock %}
