{% extends "base.html" %}

{% block title %}Конвертация HTML в Excel{% endblock %}

{% block content %}
<h2>Пакетная загрузка HTML</h2>
<br>
<form method="POST" enctype="multipart/form-data">
    <input type="file" name="html_files" multiple required>
    <br><br>
    <button type="submit">Конвертировать</button>
</form>
<p>
    Допускается загрузка нескольких HTML-файлов одновременно.
</p>
{% endblock %}
